<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>انیمال راش</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Background -->
  <div class="page-bg">
    <div class="bg-noise"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="grid-floor"></div>
    <div id="meteor-layer" class="meteor-layer"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <header class="header">

      <div class="brand">
        <div class="brand-logo-wrap">
          <img src="assets/logo.svg" alt="لوگوی بازی" class="brand-logo" />
        </div>
        <div class="brand-title">انیمال راش</div>
      </div>

      <!-- Hamburger -->
      <button class="menu-toggle" type="button" aria-label="باز کردن منو">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Menu -->
      <div class="header-actions">
        <a class="header-btn header-btn-dark" href="https://rubika.ir/animalrush">
          <span>پیوستن به روبیکا</span>
          <img src="assets/icons/rubika.svg" alt="" />
        </a>

        <a class="header-btn header-btn-gold" href="https://shop.sizakgames.ir/">
          <span>فروشگاه</span>
          <img src="assets/icons/store.svg" alt="" />
        </a>
      </div>

      <button class="menu-backdrop"></button>

    </header>

    <!-- Hero -->
    <main class="hero">

      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span>شروع ماجراجویی</span>
      </div>

      <h1 class="hero-title">
        <span>وارد دنیای</span>
        <span>پر ماجرای انیمال راش شو</span>
      </h1>

      <p class="hero-desc">
        نقش‌آفرینی توی یک شهر بزرگ همراه با ده‌ها بازیکن دیگر.
        شخصیتت را انتخاب کن، وارد شهر شو و ماجراجویی خودت را شروع کن.
      </p>

      <!-- CTA -->
      <div class="cta-group">

        <a class="cta cta-primary" href="#">
          <img src="assets/icons/download.svg" alt="" />
          <span>دانلود نسخه ویژه ورژن 1.29</span>
        </a>

        <div class="cta-row">

          <a class="cta cta-secondary" href="https://myket.ir/app/ir.sizakgames.animalrushmmo">
            <img src="assets/icons/myket.svg" alt="" />
            <span>دانلود از مایکت</span>
          </a>

          <a class="cta cta-desktop" href="https://shop.sizakgames.ir/">
            <img src="assets/icons/desktop.svg" alt="" />
            <span>نسخه دسکتاپ</span>
          </a>

        </div>

      </div>

    </main>

  </div>

  <script src="script.js"></script>

</body>
</html>
